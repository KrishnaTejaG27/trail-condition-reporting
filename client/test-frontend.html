<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { border-color: #28a745; background-color: #d4edda; }
        .error { border-color: #dc3545; background-color: #f8d7da; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Frontend Integration Test</h1>
    
    <div id="results"></div>
    
    <div class="test">
        <h3>Test Authentication Flow</h3>
        <button onclick="testAuth()">Test Authentication</button>
        <button onclick="testReports()">Test Reports</button>
        <button onclick="testProtectedRoute()">Test Protected Route</button>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let authToken = null;

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
        }

        async function testAuth() {
            log('Testing authentication flow...', 'info');
            
            try {
                // Test registration
                const registerResponse = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        username: 'testuser',
                        password: 'TestPass123',
                        firstName: 'Test',
                        lastName: 'User'
                    })
                });
                
                if (registerResponse.status === 500) {
                    log('✅ Registration endpoint exists (returns 500 due to DB, but endpoint works)', 'success');
                } else {
                    const registerData = await registerResponse.json();
                    log(`Registration response: ${JSON.stringify(registerData)}`, registerData.success ? 'success' : 'error');
                }

                // Test login with mock data
                const loginResponse = await fetch('http://localhost:3002/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'TestPass123'
                    })
                });
                
                if (loginResponse.ok) {
                    const loginData = await loginResponse.json();
                    if (loginData.success) {
                        authToken = loginData.data.token;
                        log('✅ Mock authentication successful', 'success');
                        log(`Token: ${authToken.substring(0, 20)}...`, 'info');
                    }
                } else {
                    log('❌ Mock authentication failed', 'error');
                }

            } catch (error) {
                log(`❌ Authentication test failed: ${error.message}`, 'error');
            }
        }

        async function testReports() {
            log('Testing reports CRUD...', 'info');
            
            try {
                // Test with mock reports server
                const reportsResponse = await fetch('http://localhost:3003/api/reports');
                
                if (reportsResponse.ok) {
                    const reportsData = await reportsResponse.json();
                    log(`✅ Reports endpoint working: ${reportsData.data.reports.length} reports found`, 'success');
                } else {
                    log('❌ Reports endpoint failed', 'error');
                }

                // Test create report
                const createResponse = await fetch('http://localhost:3003/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conditionType: 'FALLEN_TREE',
                        severityLevel: 'HIGH',
                        description: 'Test fallen tree',
                        location: {
                            type: 'Point',
                            coordinates: [-122.4194, 37.7749]
                        }
                    })
                });
                
                if (createResponse.ok) {
                    const createData = await createResponse.json();
                    log(`✅ Create report successful: ${createData.data.report.id}`, 'success');
                } else {
                    log('❌ Create report failed', 'error');
                }

            } catch (error) {
                log(`❌ Reports test failed: ${error.message}`, 'error');
            }
        }

        async function testProtectedRoute() {
            log('Testing protected route access...', 'info');
            
            if (!authToken) {
                log('❌ No auth token available. Run authentication test first.', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Protected route access successful', 'success');
                    log(`User: ${data.data.user.username}`, 'info');
                } else {
                    log('❌ Protected route access failed', 'error');
                }
            } catch (error) {
                log(`❌ Protected route test failed: ${error.message}`, 'error');
            }
        }

        // Auto-run tests when page loads
        window.onload = function() {
            log('Frontend test page loaded. Ready for testing!', 'info');
            log('Note: Make sure mock servers are running on ports 3002 (auth) and 3003 (reports)', 'info');
        };
    </script>
</body>
</html>
